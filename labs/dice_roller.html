<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주사위 굴리기</title>
  <style>
    :root {
      --bg: #fcf8f2;
      --panel: rgba(255, 253, 249, 0.96);
      --panel-soft: #eef5f8;
      --text: #24313a;
      --muted: #6a7b84;
      --line: #c9d7de;
      --accent: #abd0e0;
      --accent-strong: #8fbfd4;
      --shadow: rgba(74, 99, 112, 0.14);
      --ok: #2f8f63;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(171, 208, 224, 0.55), transparent 32%),
        radial-gradient(circle at top right, rgba(252, 248, 242, 0.95), transparent 40%),
        linear-gradient(180deg, #eff5f7 0%, #fcf8f2 100%);
      min-height: 100vh;
      padding: 24px;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 40px var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .header {
      padding: 24px 24px 10px;
    }

    .title {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .desc {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .main {
      padding: 0 24px 24px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 20px;
    }

    .stage {
      background: linear-gradient(180deg, rgba(171,208,224,0.18), rgba(255,253,249,0.92));
      border: 1px solid var(--line);
      border-radius: 24px;
      min-height: 500px;
      display: grid;
      place-items: center;
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: auto 12% 46px 12%;
      height: 36px;
      background: radial-gradient(ellipse at center, rgba(80, 96, 106, 0.22), rgba(80, 96, 106, 0));
      filter: blur(14px);
      pointer-events: none;
    }

    .scene {
      width: 240px;
      height: 240px;
      perspective: 900px;
      display: grid;
      place-items: center;
    }

    .cube {
      width: 140px;
      height: 140px;
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(-24deg) rotateY(35deg);
      transition: transform 1.1s cubic-bezier(.2,.8,.2,1);
    }

    .cube.rolling {
      animation: spinRoll 1.2s ease-in-out;
    }

    @keyframes spinRoll {
      0%   { transform: rotateX(-24deg) rotateY(35deg) rotateZ(0deg); }
      15%  { transform: rotateX(120deg) rotateY(160deg) rotateZ(80deg) scale(1.04); }
      35%  { transform: rotateX(260deg) rotateY(320deg) rotateZ(210deg) scale(0.98); }
      55%  { transform: rotateX(420deg) rotateY(500deg) rotateZ(330deg) scale(1.02); }
      80%  { transform: rotateX(560deg) rotateY(680deg) rotateZ(420deg); }
      100% { transform: rotateX(-24deg) rotateY(35deg) rotateZ(0deg); }
    }

    .face {
      position: absolute;
      width: 140px;
      height: 140px;
      background: linear-gradient(180deg, #ffffff 0%, #f5f9fb 100%);
      border: 2px solid #d4e2e8;
      border-radius: 24px;
      display: grid;
      padding: 18px;
      box-shadow: inset 0 0 18px rgba(171,208,224,0.18), 0 12px 24px rgba(74,99,112,0.10);
    }

    .face-1 { transform: rotateY(0deg) translateZ(70px); }
    .face-6 { transform: rotateY(180deg) translateZ(70px); }
    .face-2 { transform: rotateY(90deg) translateZ(70px); }
    .face-5 { transform: rotateY(-90deg) translateZ(70px); }
    .face-3 { transform: rotateX(90deg) translateZ(70px); }
    .face-4 { transform: rotateX(-90deg) translateZ(70px); }

    .pip-grid {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      align-items: center;
      justify-items: center;
    }

    .pip {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #3d5360;
      box-shadow: inset 0 2px 3px rgba(255,255,255,0.22), 0 2px 4px rgba(0,0,0,0.12);
      opacity: 0;
    }

    .show { opacity: 1; }

    .control {
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .section-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input[type="number"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.18s ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      background: linear-gradient(90deg, #abd0e0, #dfeef4);
      color: #1c2a32;
      border: 1px solid #b8d7e4;
    }

    .secondary {
      background: #ffffff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .result-card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      display: grid;
      gap: 10px;
    }

    .result-label {
      color: var(--muted);
      font-size: 13px;
    }

    .result-value {
      font-size: 46px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .stat {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 800;
    }

    .history {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      max-height: 220px;
      overflow: auto;
    }

    .history-title {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 800;
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: #f8fbfc;
      border: 1px solid #d9e5ea;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 700;
    }

    .status {
      min-height: 20px;
      font-size: 13px;
      font-weight: 700;
      color: var(--ok);
    }

    .footer {
      padding: 0 24px 22px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .main { grid-template-columns: 1fr; }
      .row-2, .btn-row, .stats { grid-template-columns: 1fr; }
      .stage { min-height: 380px; }
      .title { font-size: 25px; }
      .result-value { font-size: 38px; }
      body { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card">
      <div class="header">
        <h1 class="title">주사위 굴리기</h1>
        <p class="desc">
          버튼을 누르면 3D 주사위가 실제로 굴러가는 것처럼 애니메이션이 보이고 결과 숫자가 표시됩니다.<br>
          여러 번 굴리기, 합계 표시, 평균 표시, 최근 기록까지 포함한 단일 HTML 웹앱입니다.
        </p>
      </div>

      <div class="main">
        <div class="stage">
          <div class="scene">
            <div id="cube" class="cube" aria-label="주사위">
              <div class="face face-1"><div class="pip-grid" data-face="1"></div></div>
              <div class="face face-2"><div class="pip-grid" data-face="2"></div></div>
              <div class="face face-3"><div class="pip-grid" data-face="3"></div></div>
              <div class="face face-4"><div class="pip-grid" data-face="4"></div></div>
              <div class="face face-5"><div class="pip-grid" data-face="5"></div></div>
              <div class="face face-6"><div class="pip-grid" data-face="6"></div></div>
            </div>
          </div>
        </div>

        <div class="control">
          <h2 class="section-title">설정 및 결과</h2>

          <div class="row-2">
            <div>
              <label for="rollCount">한 번에 굴릴 횟수</label>
              <input id="rollCount" type="number" min="1" max="50" value="1" />
            </div>
            <div>
              <label for="animationMs">애니메이션 시간(ms)</label>
              <input id="animationMs" type="number" min="600" max="4000" step="100" value="1200" />
            </div>
          </div>

          <div class="btn-row">
            <button id="rollBtn" class="primary">주사위 굴리기</button>
            <button id="resetBtn" class="secondary">기록 초기화</button>
          </div>

          <div class="result-card">
            <div class="result-label">마지막 결과</div>
            <div id="resultValue" class="result-value">-</div>
            <div id="resultText" class="result-label">아직 굴리지 않았습니다.</div>
          </div>

          <div class="stats">
            <div class="stat">
              <div class="stat-label">총 굴린 횟수</div>
              <div id="totalRolls" class="stat-value">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">누적 합계</div>
              <div id="sumValue" class="stat-value">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">평균</div>
              <div id="avgValue" class="stat-value">0.00</div>
            </div>
          </div>

          <div class="history">
            <h3 class="history-title">최근 기록</h3>
            <div id="historyList" class="history-list"></div>
          </div>

          <div id="status" class="status">준비 완료</div>
        </div>
      </div>

      <div class="footer">
        팁: 한 번에 굴릴 횟수를 5처럼 넣으면 내부적으로 여러 번 굴리고 마지막 값이 화면의 주사위 면으로 표시됩니다.
      </div>
    </section>
  </div>

  <script>
    const cube = document.getElementById('cube');
    const rollBtn = document.getElementById('rollBtn');
    const resetBtn = document.getElementById('resetBtn');
    const rollCountInput = document.getElementById('rollCount');
    const animationMsInput = document.getElementById('animationMs');
    const resultValue = document.getElementById('resultValue');
    const resultText = document.getElementById('resultText');
    const totalRolls = document.getElementById('totalRolls');
    const sumValue = document.getElementById('sumValue');
    const avgValue = document.getElementById('avgValue');
    const historyList = document.getElementById('historyList');
    const status = document.getElementById('status');

    let history = [];
    let totalCount = 0;
    let totalSum = 0;
    let isRolling = false;

    const faceMap = {
      1: 'rotateX(0deg) rotateY(0deg)',
      2: 'rotateX(0deg) rotateY(-90deg)',
      3: 'rotateX(-90deg) rotateY(0deg)',
      4: 'rotateX(90deg) rotateY(0deg)',
      5: 'rotateX(0deg) rotateY(90deg)',
      6: 'rotateX(0deg) rotateY(180deg)'
    };

    const pipPositions = {
      1: [4],
      2: [0, 8],
      3: [0, 4, 8],
      4: [0, 2, 6, 8],
      5: [0, 2, 4, 6, 8],
      6: [0, 2, 3, 5, 6, 8]
    };

    function setStatus(message) {
      status.textContent = message;
    }

    function createPips() {
      document.querySelectorAll('.pip-grid').forEach(grid => {
        const face = Number(grid.dataset.face);
        const visible = pipPositions[face];
        grid.innerHTML = '';
        for (let i = 0; i < 9; i++) {
          const pip = document.createElement('span');
          pip.className = 'pip' + (visible.includes(i) ? ' show' : '');
          grid.appendChild(pip);
        }
      });
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function applyFace(value) {
      const base = faceMap[value];
      cube.style.transform = `${base}`;
    }

    function animateToFace(value, duration) {
      cube.style.transition = 'none';
      cube.classList.remove('rolling');
      void cube.offsetWidth;
      cube.style.animationDuration = `${duration}ms`;
      cube.classList.add('rolling');

      return new Promise(resolve => {
        setTimeout(() => {
          cube.classList.remove('rolling');
          cube.style.transition = 'transform 0.6s cubic-bezier(.2,.8,.2,1)';
          const extraX = 360 * randomInt(1, 3);
          const extraY = 360 * randomInt(1, 3);
          cube.style.transform = `${faceMap[value]} rotateX(${extraX}deg) rotateY(${extraY}deg)`;

          setTimeout(() => {
            cube.style.transition = 'transform 0.45s ease';
            cube.style.transform = faceMap[value];
            setTimeout(resolve, 460);
          }, 60);
        }, duration);
      });
    }

    function updateStats() {
      totalRolls.textContent = String(totalCount);
      sumValue.textContent = String(totalSum);
      avgValue.textContent = totalCount ? (totalSum / totalCount).toFixed(2) : '0.00';
    }

    function renderHistory() {
      historyList.innerHTML = '';
      if (!history.length) {
        historyList.innerHTML = '<div class="history-item"><span>기록 없음</span><span>-</span></div>';
        return;
      }

      [...history].reverse().slice(0, 12).forEach((entry, index) => {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `<span>${entry.time}</span><span>${entry.values.join(', ')}</span>`;
        historyList.appendChild(item);
      });
    }

    async function rollDice() {
      if (isRolling) return;
      isRolling = true;
      rollBtn.disabled = true;

      const rollCount = Math.min(50, Math.max(1, Number(rollCountInput.value) || 1));
      const duration = Math.min(4000, Math.max(600, Number(animationMsInput.value) || 1200));
      const values = [];

      setStatus('주사위를 굴리는 중...');

      for (let i = 0; i < rollCount; i++) {
        const value = randomInt(1, 6);
        values.push(value);
        await animateToFace(value, duration);
      }

      const last = values[values.length - 1];
      const batchSum = values.reduce((a, b) => a + b, 0);
      totalCount += values.length;
      totalSum += batchSum;

      resultValue.textContent = String(last);
      resultText.textContent = rollCount === 1
        ? `주사위 결과는 ${last}입니다.`
        : `${rollCount}번 굴린 결과: ${values.join(', ')} / 합계 ${batchSum}`;

      history.push({
        time: new Date().toLocaleTimeString('ko-KR'),
        values: [...values]
      });

      updateStats();
      renderHistory();
      setStatus(`완료: ${rollCount}번 굴렸습니다.`);

      isRolling = false;
      rollBtn.disabled = false;
    }

    function resetAll() {
      history = [];
      totalCount = 0;
      totalSum = 0;
      resultValue.textContent = '-';
      resultText.textContent = '아직 굴리지 않았습니다.';
      updateStats();
      renderHistory();
      setStatus('기록을 초기화했습니다.');
      cube.style.transition = 'transform 0.6s ease';
      cube.style.transform = 'rotateX(-24deg) rotateY(35deg)';
    }

    createPips();
    renderHistory();
    updateStats();
    cube.style.transform = 'rotateX(-24deg) rotateY(35deg)';

    rollBtn.addEventListener('click', rollDice);
    resetBtn.addEventListener('click', resetAll);
  </script>
</body>
</html>
