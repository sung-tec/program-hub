<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>스카이 점퍼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <canvas id="gameCanvas" aria-label="스카이 점퍼 게임 화면"></canvas>

    <section id="startScreen" class="screen active">
      <div class="start-panel">
        <p class="eyebrow">2D Vertical Arcade</p>
        <h1>스카이 점퍼</h1>
        <p class="subtitle">발판을 타고 계속 올라가세요. 떨어지면 끝!</p>

        <div class="difficulty-group" role="radiogroup" aria-label="난이도 선택">
          <button class="difficulty active" data-difficulty="easy" role="radio" aria-checked="true">
            <span>쉬움</span>
            <small>큰 발판 · 좁은 간격</small>
          </button>
          <button class="difficulty" data-difficulty="normal" role="radio" aria-checked="false">
            <span>보통</span>
            <small>움직이는 발판 등장</small>
          </button>
          <button class="difficulty" data-difficulty="hard" role="radio" aria-checked="false">
            <span>어려움</span>
            <small>작은 발판 · 사라지는 발판</small>
          </button>
        </div>

        <button id="startButton" class="primary-button">시작</button>
      </div>
    </section>

    <section id="hud" class="hud" aria-live="polite">
      <div class="score-pill">
        <span>점수</span>
        <strong id="scoreText">0</strong>
      </div>
      <div class="score-pill">
        <span>최고</span>
        <strong id="bestText">0</strong>
      </div>
      <button id="pauseButton" class="icon-button" aria-label="일시정지" title="일시정지">II</button>
    </section>

    <section id="chargeHud" class="charge-hud" aria-label="점프 충전 게이지">
      <div class="charge-track">
        <div id="chargeFill" class="charge-fill"></div>
      </div>
      <span id="chargeLabel">점프 충전</span>
    </section>

    <button id="jumpButton" class="jump-button" aria-label="점프 충전 버튼">
      <span>JUMP</span>
    </button>

    <section id="pauseScreen" class="screen">
      <div class="modal-panel">
        <h2>일시정지</h2>
        <p>잠깐 숨 고르고 다시 올라가요.</p>
        <button id="resumeButton" class="primary-button">계속하기</button>
      </div>
    </section>

    <section id="gameOverScreen" class="screen">
      <div class="modal-panel">
        <p class="eyebrow">Game Over</p>
        <h2>추락했어요</h2>
        <div class="result-grid">
          <div>
            <span>최종 점수</span>
            <strong id="finalScoreText">0</strong>
          </div>
          <div>
            <span>최고 점수</span>
            <strong id="finalBestText">0</strong>
          </div>
        </div>
        <button id="restartButton" class="primary-button">다시 시작</button>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
